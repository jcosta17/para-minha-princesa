<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Para Você ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&display=swap" rel="stylesheet">

<style>

body{
margin:0;
padding:0;
background:black;
color:white;
font-family:'Dancing Script', cursive;
overflow:hidden;
text-align:center;
}

/* estrelas */

.stars{
position:fixed;
width:100%;
height:100%;
background:url('https://www.transparenttextures.com/patterns/stardust.png');
animation:moveStars 100s linear infinite;
}

@keyframes moveStars{
from{background-position:0 0;}
to{background-position:10000px 5000px;}
}

/* corações */

.heart{
position:fixed;
color:red;
animation:fall 6s linear infinite;
font-size:20px;
}

@keyframes fall{
0%{transform:translateY(-10vh)}
100%{transform:translateY(110vh)}
}

/* slides */

.slide{
display:none;
height:100vh;
align-items:center;
justify-content:center;
flex-direction:column;
padding:30px;
}

.active{
display:flex;
}

/* texto */

h1{
font-size:3em;
max-width:700px;
}

/* botões */

button{
margin-top:30px;
padding:15px 30px;
font-size:1.3em;
border:none;
border-radius:30px;
background:#ff4d6d;
color:white;
cursor:pointer;
}

button:hover{
background:#ff1e4d;
}

.nav{
position:fixed;
bottom:30px;
width:100%;
display:flex;
justify-content:center;
gap:20px;
}

</style>
</head>

<body>

<div class="stars"></div>

<audio autoplay loop>
<source src="SUA-MUSICA.mp3" type="audio/mpeg">
</audio>

<div id="slides">

<div class="slide active">
<h1>Escaneie ❤️</h1>
</div>

<div class="slide">
<h1>Fiz isso especialmente pra você 🐆</h1>
</div>

<div class="slide">
<h1>Meu coração é seu ❤️</h1>
<button onclick="nextSlide()">Tocar seu coração</button>
</div>

<div class="slide">
<h1>Você tem a chave dele 🔑</h1>
<button onclick="nextSlide()">Abrir</button>
</div>

<div class="slide">
<h1>🦋 Meu amor por você é livre,<br>
leve e bonito como uma borboleta</h1>
<button onclick="nextSlide()">Continuar</button>
</div>

<div class="slide">
<h1>Obrigado por existir ❤️<br><br>
Seu futuro namorado</h1>
</div>

</div>

<div class="nav">
<button onclick="prevSlide()">⬅ Voltar</button>
<button onclick="nextSlide()">➡ Avançar</button>
</div>

<script>

let current=0
let slides=document.querySelectorAll(".slide")

function showSlide(n){
slides.forEach(s=>s.classList.remove("active"))
slides[n].classList.add("active")
}

function nextSlide(){
if(current < slides.length-1){
current++
showSlide(current)
}
}

function prevSlide(){
if(current >0){
current--
showSlide(current)
}
}

/* corações */

function createHeart(){
let heart=document.createElement("div")
heart.classList.add("heart")
heart.innerHTML="❤️"
heart.style.left=Math.random()*100+"vw"
heart.style.fontSize=(Math.random()*20+10)+"px"

document.body.appendChild(heart)

setTimeout(()=>{
heart.remove()
},6000)
}

setInterval(createHeart,400)

</script>

</body>
</html>
